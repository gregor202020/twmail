[databases]
twmail = host=postgres port=5432 dbname=twmail

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction

; Pool sizing math (transaction mode multiplexes connections):
;   Client-side pg.Pool instances:
;     - api process:           max=20 connections
;     - worker-bulk process:   max=20 connections
;     - worker-system process: max=20 connections
;   Total client-side demand: up to 60 connections
;   In transaction mode each server connection serves many client connections,
;   so PgBouncer server connections << client connections.
;
;   PgBouncer server connections:
;     default_pool_size=40 + reserve_pool_size=5 = 45 server connections max
;   Postgres max_connections=50 leaves 5 for superuser/monitoring access.
default_pool_size = 40
max_client_conn = 400
reserve_pool_size = 5
reserve_pool_timeout = 3
server_reset_query = DISCARD ALL
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
ignore_startup_parameters = extra_float_digits,options
