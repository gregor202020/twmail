version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: twmail-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c max_wal_size=1GB
        -c shared_preload_libraries='pg_stat_statements'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - twmail

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: twmail-pgbouncer
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 40
      MAX_CLIENT_CONN: 400
      RESERVE_POOL_SIZE: 5
    ports:
      - "127.0.0.1:6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - twmail

  redis:
    image: redis:7-alpine
    container_name: twmail-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - twmail

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: twmail-api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - API_PORT=${API_PORT}
      - API_HOST=${API_HOST}
      - NODE_ENV=${NODE_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - RATE_LIMIT_DASHBOARD=${RATE_LIMIT_DASHBOARD}
      - RATE_LIMIT_API_KEY=${RATE_LIMIT_API_KEY}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - LOG_LEVEL=${LOG_LEVEL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - twmail

  worker-bulk:
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    container_name: twmail-worker-bulk
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - WORKER_TYPE=bulk
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SES_CONFIGURATION_SET=${SES_CONFIGURATION_SET:-marketing}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - twmail

  worker-system:
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    container_name: twmail-worker-system
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - WORKER_TYPE=system
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SES_CONFIGURATION_SET=${SES_CONFIGURATION_SET:-marketing}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - twmail

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: twmail-frontend
    environment:
      - API_URL=http://api:3000
      - NODE_ENV=production
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      - api
    networks:
      - twmail

  nginx:
    image: nginx:alpine
    container_name: twmail-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${SSL_CERT_PATH:-./nginx/certs/fullchain.pem}:/etc/ssl/certs/fullchain.pem:ro
      - ${SSL_KEY_PATH:-./nginx/certs/privkey.pem}:/etc/ssl/private/privkey.pem:ro
    depends_on:
      - api
      - frontend
    networks:
      - twmail

  bull-board:
    image: node:22-alpine
    container_name: twmail-bull-board
    working_dir: /app
    command: echo "Bull Board placeholder - will be configured in Plan 2"
    networks:
      - twmail

volumes:
  pgdata:
  redisdata:
  assets:

networks:
  twmail:
    driver: bridge
